services:
  postgres:
    image: postgres:16-alpine
    container_name: itarena-postgres
    environment:
      POSTGRES_USER: itarena
      POSTGRES_PASSWORD: itarena
      POSTGRES_DB: itarena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itarena -d itarena"]
      interval: 5s
      timeout: 5s
      retries: 12

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: itarena-meilisearch
    environment:
      MEILI_MASTER_KEY: "itarena-dev-master-key"
      MEILI_ENV: "development"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  meilisearch_data:
    driver: local
