services:
  postgres:
    image: postgres:16-alpine
    container_name: itarena-postgres
    environment:
      POSTGRES_USER: itarena
      POSTGRES_PASSWORD: itarena
      POSTGRES_DB: itarena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itarena -d itarena"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
    driver: local
